<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDRIVE Web Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f0f0f0; color: #333; display: flex; height: 100vh; overflow: hidden; }
        #appContainer { display: flex; width: 100%; height: 100%; }
        #mainContent { 
            flex-grow: 1; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            /* margin-left 등 제거 */
        }
        
        #viewerContainer { 
            flex-grow: 1; 
            display: block; 
            width: 100%; 
            position: relative; 
        }
        
        #controls { 
            background-color: rgba(255,255,255,0.9); 
            padding: 10px; 
            border-bottom: 1px solid #ccc;
            z-index: 10; 
            /* margin-left, width calc 제거 */
            box-sizing: border-box; 
        }
        #debugPanelContainer { 
            width: 100%; 
            max-width: none; 
            height: 150px; 
            background-color: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px; 
            border-top: 1px solid #ccc;
            overflow-y: auto; 
            font-family: monospace;
            font-size: 12px;
            box-sizing: border-box; 
            position: relative; 
            /* margin-left, width calc 제거 */
        }
        #debugPanelContainer h4 { margin-top: 0; color: #0f0; }
        input[type="file"] { margin-bottom: 5px; }

        /* 로딩 인디케이터 스타일 */
        #loadingIndicator {
            position: fixed; /* 화면 전체 기준 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* 반투명 배경 */
            color: white;
            font-size: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000; /* 최상단에 표시 */
            display: none; /* 기본적으로 숨김 */
        }

        /* 오른쪽 상단 컨트롤 패널 스타일 */
        #viewControlsPanel {
            position: absolute;
            top: 60px; /* FPS 표시 공간 확보를 위해 top 위치 조정 */
            left: 10px; /* 오른쪽 대신 왼쪽에 배치 */
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            z-index: 20;
            font-size: 12px;
            max-height: calc(100vh - 70px); /* top 값을 고려하여 max-height 조정 (60px + 10px 여유) */
            overflow-y: auto; /* 내용이 많으면 스크롤 */
            width: 280px; /* 너비 약간 증가 (RoadList 포함 위해) */
        }
        #viewControlsPanel div {
            margin-bottom: 5px;
        }
        #viewControlsPanel label {
            margin-left: 5px;
        }
        #viewControlsPanel button {
            margin-top: 5px;
            padding: 3px 8px;
        }
        /* RoadList를 viewControlsPanel 내부에 넣기 위한 스타일 */
        #roadListContainerInPanel {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ccc;
        }
        #roadListContainerInPanel h4 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1em; /* viewControlsPanel 폰트 크기와 유사하게 */
        }
        #roadList { /* 기존 #roadList 스타일 일부는 여기서 관리 */
            list-style-type: none; 
            padding: 0; 
            margin: 0;
            max-height: 200px; /* RoadList 자체의 최대 높이, 필요시 조절 */
            overflow-y: auto;
        }
        #roadList li { 
            padding: 4px 6px; /* 패딩 조정 */
            cursor: pointer; 
            border-bottom: 1px solid #eee; /* 경계선 색상 연하게 */ 
            font-size: 11px; /* 폰트 크기 유지 */
        }
        #roadList li:hover { 
            background-color: #f0f0f0; 
        }
        #roadList li.selected { 
            background-color: #e0e0e0; /* 선택 시 배경색 약간 변경 */
            font-weight: bold; 
        }

        .loading-progress {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
            z-index: 1000;
        }

        .progress-container {
            width: 300px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 14px;
            margin-top: 5px;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
            "three/addons/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js",
            "three/addons/libs/stats.module.js": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/libs/stats.module.js"
        }
    }
    </script>

</head>
<body>
    <div id="app">
        <div id="toolbar">
            <input type="file" id="fileInput" accept=".xodr">
            <button id="loadDefaultBtn">Load Default</button>
            <button id="toggleReferenceLinesBtn">Toggle Reference Lines</button>
            <div id="roadList"></div>
        </div>
        <div id="viewer"></div>
        <div id="loadingIndicator" class="loading-indicator">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading...</div>
            <div class="loading-progress">0%</div>
        </div>
    </div>

    <!-- Core Libraries -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script> -->
    
    <!-- Application Scripts -->
    <script type="module">
        import { OpenDriveViewer } from './OpenDriveViewer.js';

        // DOM이 완전히 로드된 후에 초기화
        document.addEventListener('DOMContentLoaded', () => {
            try {
                console.log('DOM loaded, starting initialization...');

                // UI 요소 ID 정의
                const uiElements = {
                    fileInputId: 'fileInput',
                    loadDefaultBtnId: 'loadDefaultBtn',
                    toggleReferenceLinesBtnId: 'toggleReferenceLinesBtn',
                    roadListId: 'roadList',
                    loadingIndicatorId: 'loadingIndicator'
                };

                // 각 UI 요소가 존재하는지 확인
                console.log('Checking UI elements...');
                for (const [key, id] of Object.entries(uiElements)) {
                    const element = document.getElementById(id);
                    console.log(`Checking element ${id}:`, element ? 'found' : 'not found');
                    if (!element) {
                        throw new Error(`Required UI element not found: ${id}`);
                    }
                }

                console.log('All UI elements found, initializing OpenDriveViewer...');
                // OpenDriveViewer 초기화
                const viewer = new OpenDriveViewer('viewer', uiElements);
                window.viewer = viewer; // 콘솔에서 전역으로 접근 가능하도록 노출
                console.log('OpenDriveViewer initialized successfully');

                // 초기에는 항상 보이도록
                viewer.sceneManager.setRoadsVisible(true);

                // 새로운 함수가 로드된 상태인지 확인
                console.log('Checking new function:', viewer.sceneManager.addRoad.toString().includes('visible = true'));
            } catch (error) {
                console.error('Failed to initialize OpenDriveViewer:', error);
                console.error('Error stack:', error.stack);
                alert(`Failed to start viewer: ${error.message}\n\nPlease check the browser console for more details.`);
            }
        });
    </script>

    <!-- Removed obsolete OpenDriveParser global assignment -->
</body>
</html>
